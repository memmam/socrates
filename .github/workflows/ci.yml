name: CI

# No paths filter, deliberately — unlike bench.yml (fires only on
# bench/<name> branches), every push and PR runs the full gauntlet
# regardless of which files changed. A change that looks docs-only can
# still need the full suite: tools/check_counts.sh's prose-count
# assertions and the book/port cross-checks all read live program
# output, so a README, CLAUDE.md, or PROJECT.md edit that drifts a
# stated count is exactly the kind of "doesn't touch source" change
# this job exists to catch. Scoping triggers by path would need a
# second, narrower judgment call about which files are truly inert —
# not worth it next to a ~few-minute-overhead full run on every push.
on:
  push:
    branches: [main]
  pull_request:

# Without this, every push to an open PR leaves its prior run's jobs
# orphaned in `in_progress` forever instead of superseding them — confirmed
# 2026-07-16: a dozen-plus stale runs piled up across a single PR's iterative
# debugging session, several windows-latest jobs among them (2x-billed
# runner minutes). One push per (workflow, ref) may run at a time; a new
# push cancels whatever's still going for that same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege token: nothing in CI writes to the repo (bench and
# cleanup declare their own grants). Added 2026-07-18, audit batch 1.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (stable)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable branch, resolved 2026-07-18
        with:
          components: clippy
      - name: Build
        run: cargo build --all-targets
      - name: Zero dependencies in the default build
        # Every build is dependency-free: the tree is exactly one line
        # (this crate). Since the wgpu deletion there are no exceptions —
        # the feature jobs below each assert their own tree too.
        run: test "$(cargo tree -e normal --prefix none | wc -l)" -eq 1
      - name: Unit + golden spec tests
        run: cargo test
      - name: Golden spec tests under GC stress
        run: SOCRATES_GC_STRESS=1 cargo test --test spec_runner
      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings
      - name: Examples smoke test
        run: |
          cargo build --release
          ./target/release/socrates examples/mandelbrot.soc > /dev/null
          ./target/release/socrates examples/algorithms.soc > /dev/null
          ./target/release/socrates examples/life.soc > /dev/null
          ./target/release/socrates examples/brainfuck.soc > /dev/null
          ./target/release/socrates examples/json.soc > /dev/null
          ./target/release/socrates examples/adventure.soc < /dev/null > /dev/null
          ./target/release/socrates examples/orbit/main.soc > /dev/null
          ./target/release/socrates examples/loc.soc . > /dev/null
          ./target/release/socrates check examples/raytracer.soc
          ./target/release/socrates test tests/spec > /dev/null
      - name: Demo golden tests
        # demos/glcube/main.soc needs a live GL context (see the `gl` job's
        # own Xvfb step below) — every other .soc file under demos/,
        # including glcube's own GL-free cube.soc/spec.soc, runs here.
        run: |
          shopt -s extglob
          ./target/release/socrates test demos/!(glcube)/ demos/glcube/cube.soc demos/glcube/spec.soc > /dev/null
      - name: Prose counts match the live suite
        # The five spec-count places, the book executed/total pair, the
        # demo-suite count, and the spelled-out demo-program count —
        # extracted from prose by exact anchor and diffed against a
        # fresh run, so a stale number (the 311-vs-313 release-notes
        # incident) fails here instead of shipping.
        run: ./tools/check_counts.sh ./target/release/socrates
      - name: Self-contained demo binary (socrates build)
        # Staple a data-reading demo and a worker demo into standalone
        # binaries and prove each reproduces its source run byte-for-byte
        # from an unrelated working directory.
        run: |
          for demo in csvql parmandel; do
            ./target/release/socrates build "demos/$demo" -o "/tmp/$demo-bin"
            ( cd /tmp && "/tmp/$demo-bin" ) > "/tmp/$demo-bin.out"
            ./target/release/socrates "demos/$demo/main.soc" > "/tmp/$demo-src.out"
            diff "/tmp/$demo-src.out" "/tmp/$demo-bin.out"
          done
      - name: FFT numpy cross-check
        run: |
          python3 -m pip install --quiet numpy
          python3 tools/fft_crosscheck.py ./target/release/socrates
      - name: pyl layer golden tests + SOS freeze check
        run: |
          SOCRATES_PATH=ports ./target/release/socrates test ports/pyl/spec.soc
          SOCRATES_GC_STRESS=1 SOCRATES_PATH=ports ./target/release/socrates test ports/pyl/spec.soc
          SOCRATES_PATH=ports ./target/release/socrates ports/pyl/check_freeze.soc
          python3 -m pip install --quiet scipy
          python3 ports/claudewave/reference/check_sos_vs_scipy.py ports/claudewave/reference/sos_freeze.txt
      - name: claudewave port cross-validation (Socrates vs shim-run upstream)
        run: |
          mkdir -p /tmp/cw
          python3 ports/claudewave/reference/gen_stream.py /tmp/cw/rand_stream.txt
          CLAUDEWAVE_STREAM=/tmp/cw/rand_stream.txt python3 ports/claudewave/reference/run_upstream.py /tmp/cw/truth
          SOCRATES_PATH=ports CLAUDEWAVE_STREAM=/tmp/cw/rand_stream.txt ./target/release/socrates ports/claudewave/battery.soc /tmp/cw/socrates
          n=$(ls /tmp/cw/truth/*.paw | wc -l)
          test "$n" -eq 32 || { echo "expected 32 battery items, got $n"; exit 1; }
          for p in /tmp/cw/truth/*.paw; do
            name=$(basename "$p")
            echo "== $name"
            python3 ports/claudewave/reference/compare_paw.py "$p" "/tmp/cw/socrates/$name" || exit 1
          done
          diff /tmp/cw/truth/chords.txt /tmp/cw/socrates/chords.txt
      - name: ICAA port golden tests
        run: SOCRATES_PATH=ports ./target/release/socrates test ports/icaa/spec.soc
      - name: ICAA port cross-validation (Socrates vs JS reference)
        run: |
          mkdir -p /tmp/icaa-scenes
          SOCRATES_PATH=ports ./target/release/socrates ports/icaa/scenes.soc /tmp/icaa-scenes > /dev/null
          count=0
          for scene in /tmp/icaa-scenes/*.ppm; do
            name=$(basename "$scene" .ppm)
            for preset in quality fast; do
              node ports/icaa/reference/icaa-cpu.mjs "$scene" "/tmp/icaa-scenes/${name}_${preset}_js.ppm" "$preset"
              SOCRATES_PATH=ports ./target/release/socrates ports/icaa/main.soc "$scene" "/tmp/icaa-scenes/${name}_${preset}_fb.ppm" "$preset"
              node ports/icaa/reference/compare.mjs "/tmp/icaa-scenes/${name}_${preset}_js.ppm" "/tmp/icaa-scenes/${name}_${preset}_fb.ppm"
              count=$((count+1))
            done
          done
          echo "scene battery comparisons: $count"
          test "$count" -eq 18
      - name: ICAA debug-view cross-validation (Socrates vs JS reference)
        # All five debug views (1=confidence 2=coverage 3=distance
        # 4=orientation 5=rms) on every base scene at both presets:
        # 9 x 2 x 5 = 90 pixel-exact comparisons. Scenes are regenerated
        # into a fresh dir so the glob can't pick up the previous step's
        # rendered outputs.
        run: |
          mkdir -p /tmp/icaa-dbg/scenes /tmp/icaa-dbg/out
          SOCRATES_PATH=ports ./target/release/socrates ports/icaa/scenes.soc /tmp/icaa-dbg/scenes > /dev/null
          count=0
          for scene in /tmp/icaa-dbg/scenes/*.ppm; do
            name=$(basename "$scene" .ppm)
            for preset in quality fast; do
              for view in 1 2 3 4 5; do
                node ports/icaa/reference/icaa-cpu.mjs "$scene" "/tmp/icaa-dbg/out/${name}_${preset}_d${view}_js.ppm" "$preset" debug "$view"
                SOCRATES_PATH=ports ./target/release/socrates ports/icaa/main.soc "$scene" "/tmp/icaa-dbg/out/${name}_${preset}_d${view}_fb.ppm" "$preset" debug "$view"
                node ports/icaa/reference/compare.mjs "/tmp/icaa-dbg/out/${name}_${preset}_d${view}_js.ppm" "/tmp/icaa-dbg/out/${name}_${preset}_d${view}_fb.ppm"
                count=$((count+1))
              done
            done
          done
          echo "debug-view comparisons: $count"
          test "$count" -eq 90
      - name: ICAA adversarial perturbation battery (Socrates vs JS reference)
        # The original one-time adversarial review round, reconstructed as
        # a permanent deterministic corpus: adversarial.soc draws 47
        # perturbed scenes (edges down to slope 0.02, thin lines, rings,
        # discs, noise fields, gratings, ramps, bars, and 1x1/8x1-class
        # tiny images) from a fixed-seed hand-rolled SplitMix64 stream —
        # never math.seed, so the corpus outlives releases — and every
        # scene is rendered by both implementations at both presets:
        # 47 x 2 = 94 pixel-exact comparisons.
        run: |
          mkdir -p /tmp/icaa-adv/scenes /tmp/icaa-adv/out
          SOCRATES_PATH=ports ./target/release/socrates ports/icaa/adversarial.soc /tmp/icaa-adv/scenes
          count=0
          for scene in /tmp/icaa-adv/scenes/*.ppm; do
            name=$(basename "$scene" .ppm)
            for preset in quality fast; do
              node ports/icaa/reference/icaa-cpu.mjs "$scene" "/tmp/icaa-adv/out/${name}_${preset}_js.ppm" "$preset"
              SOCRATES_PATH=ports ./target/release/socrates ports/icaa/main.soc "$scene" "/tmp/icaa-adv/out/${name}_${preset}_fb.ppm" "$preset"
              node ports/icaa/reference/compare.mjs "/tmp/icaa-adv/out/${name}_${preset}_js.ppm" "/tmp/icaa-adv/out/${name}_${preset}_fb.ppm"
              count=$((count+1))
            done
          done
          echo "adversarial comparisons: $count"
          test "$count" -eq 94

  gl:
    name: window feature (X11/GLX)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable branch, resolved 2026-07-18
        with:
          components: clippy
      - name: Install X11 dev headers + Xvfb
        # `--features gl` links against libX11 normally (see src/window/x11.rs's
        # module docs): that needs the unversioned `libX11.so` dev symlink,
        # which `libx11-dev` provides — the bare runtime lib alone (already on
        # any desktop image) isn't enough for the linker to find `-lX11`.
        run: sudo apt-get update && sudo apt-get install -y libx11-dev xvfb
      - name: Build (gl)
        run: cargo build --features gl
      - name: Clippy (gl, deny warnings)
        run: cargo clippy --features gl --all-targets -- -D warnings
      - name: Unit + golden spec tests (gl, under Xvfb)
        run: |
          Xvfb :99 -screen 0 1024x768x24 &
          # xvfb-run is the standard tool, but this server is shared by
          # later steps in the job (glcube pins, doc snippets), so wait
          # on the display socket instead of a race-prone fixed sleep.
          for _ in $(seq 1 100); do [ -e /tmp/.X11-unix/X99 ] && break; sleep 0.1; done
          DISPLAY=:99 cargo test --features gl
      - name: glcube demo golden tests (gl, under Xvfb, real rendered pixels)
        # The one demo whose golden test needs an actual GL context (SPEC
        # § 7.4's own verification convention: pixel spot-checks, not a
        # framebuffer hash — see demos/glcube/README.md). Xvfb from the step
        # above is still running on :99. Explicit files, not the directory:
        # main_metal.soc (the Metal twin, identical pins) can only render
        # on Apple Silicon macOS — the gl-macos-metal job asserts it there.
        run: |
          cargo build --release --features gl
          DISPLAY=:99 ./target/release/socrates test demos/glcube/main.soc demos/glcube/cube.soc demos/glcube/spec.soc

  gl-windows:
    name: window feature (Win32/WGL)
    runs-on: windows-latest
    # This job hung indefinitely (no output, no timeout for hours) on every
    # run since the Win32/WGL backend first merged. Root-caused via a
    # temporary watchdog-thread instrumentation of tests/lsp_smoke.rs (see
    # its git history / PR #47): window/win32.rs was never the problem --
    # all 79 lib unit tests, including window::win32::tests::
    # create_clear_swap_poll_close, pass in well under a second on real
    # windows-latest hardware. lsp_smoke.rs's own uri_for() helper built
    # file:// URIs from raw Windows backslash paths, which broke the JSON
    # framing (\U/\A aren't valid JSON escapes) and got silently dropped by
    # lsp.rs's parse-error handling -- so the test hung forever awaiting a
    # publishDiagnostics notification the server had already discarded.
    # Fixed by percent-encoding the URI properly. timeout-minutes stays as
    # a general safety net regardless of cause.
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable branch, resolved 2026-07-18
        with:
          components: clippy
      - name: Build (gl)
        run: cargo build --features gl
      - name: Clippy (gl, deny warnings)
        run: cargo clippy --features gl --all-targets -- -D warnings
      - name: Unit + golden spec tests (gl)
        # windows-latest is a real Windows machine (unlike the `gl` job's
        # Xvfb-under-Linux stand-in), so `win32/gl.rs`'s smoke test creates
        # and drives an actual window/WGL context here.
        run: cargo test --features gl
      - name: Build + clippy + tests (gl,vulkan coexistence; vulkan alone)
        # The win32/ split (the x11/ Phase-0 pattern): one binary carries
        # both the WGL backend and the Vulkan window scaffolding, and a
        # vulkan-only build compiles cleanly too. create_vulkan currently
        # returns the Phase-0 scaffolding Err (pinned by
        # win32::tests::create_vulkan_errs_cleanly_in_phase0) — the WSI
        # phase makes it real. Diagnostics: report whether this runner has
        # any Vulkan loader at all (it is NOT expected to), so the WSI
        # phase's CI story is decided from evidence.
        shell: bash
        run: |
          cargo build --features gl,vulkan
          cargo clippy --features gl,vulkan --all-targets -- -D warnings
          cargo test --features gl,vulkan
          cargo build --features vulkan
          cargo clippy --features vulkan --all-targets -- -D warnings
      - name: Win32 Vulkan window smoke (best effort; the loader exists, a device may not)
        # PR #66's probe proved vulkan-1.dll ships with windows-latest, but
        # a loader without an ICD errs at instance/device creation — so this
        # asserts exit 0 and echoes the ok/err line. If the log ever shows
        # the ok line (a device enumerates), flip to the hard-asserted
        # exact-line discipline like the Linux vulkan job's smoke.
        shell: bash
        run: |
          cargo build --release --features gl,vulkan
          out=$(./target/release/socrates.exe docs/assets/vulkan_window.soc)
          echo "$out"

  gl-macos:
    # Real Apple Silicon hardware (unlike this repo's own dev/CI containers,
    # which are Linux) — the only environment that can actually link and run
    # `src/window/macos/gl.rs`'s Cocoa/NSOpenGL FFI. Mirrors the `gl` (Linux)
    # job's steps one-for-one; there's no equivalent of Xvfb needed here
    # since `cargo test --features gl` on macOS runs against the real
    # window server, and `macos/gl.rs`'s test skips gracefully if that's
    # restricted in this environment (see its module docs).
    name: window feature (Cocoa/NSOpenGL, Apple Silicon, ${{ matrix.os }})
    # macos-14 is deprecated upstream (brownouts since 2026-07-06,
    # removal 2026-11-02). Deprecated is not discontinued: both images
    # run until 14 is actually removed — brownouts expand coverage,
    # they never early-retire it (PROJECT.md platform-scoping rule).
    # Drop the macos-14 row on the removal date.
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable branch, resolved 2026-07-18
        with:
          components: clippy
      - name: Build (gl)
        run: cargo build --features gl
      - name: Clippy (gl, deny warnings)
        run: cargo clippy --features gl --all-targets -- -D warnings
      - name: Unit + golden spec tests (gl)
        run: cargo test --features gl

  gl-macos-metal:
    # Metal ships additive alongside OpenGL/CGL on macOS -- PROJECT.md's
    # standing exception to the "newer backend supersedes the older one"
    # rule. This job is the actual proof of that coexistence, not just of
    # compilation: `--features gl,metal` together on real Apple Silicon
    # hardware, plus `--features metal` alone, each with its own zero-dep
    # check (the `metal` feature is raw FFI like `gl`, not a new Cargo
    # dependency). `gl-macos` above stays untouched as the OpenGL-only
    # regression check.
    name: window feature (Metal, Apple Silicon, ${{ matrix.os }})
    # Dual-image per the gl-macos note above. The Metal-capable
    # paravirtual-GPU claim below is image-specific: the macos-15 row
    # IS its revalidation on the successor image.
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable branch, resolved 2026-07-18
        with:
          components: clippy
      - name: Build (metal)
        run: cargo build --features metal
      - name: Clippy (metal, deny warnings)
        run: cargo clippy --features metal --all-targets -- -D warnings
      - name: Unit + golden spec tests (metal)
        run: cargo test --features metal
      - name: Zero dependencies (metal feature alone)
        run: test "$(cargo tree -e normal --prefix none --features metal | wc -l)" -eq 1
      - name: Build (gl + metal together — the coexistence proof)
        run: cargo build --features gl,metal
      - name: Clippy (gl + metal, deny warnings)
        run: cargo clippy --features gl,metal --all-targets -- -D warnings
      - name: Unit + golden spec tests (gl + metal together)
        run: cargo test --features gl,metal
      - name: Zero dependencies (gl + metal together)
        run: test "$(cargo tree -e normal --prefix none --features gl,metal | wc -l)" -eq 1
      - name: Metal triangle smoke (best effort)
        # The real-hardware proof of the Metal gfx surface: opens a Metal
        # window, compiles an MSL shader pair, uploads a triangle, draws,
        # reads back the center pixel through the GL-parity Y-flip, and
        # presents. Prints `ok: metal triangle drawn, center=[255, 128, 64,
        # 255]`-ish when the runner has a Metal device + window server,
        # `err: <reason>` when either is unavailable — both exit 0 (the
        # environment-dependent-asset convention); assert only exit 0
        # but echo the line to the log so a silent capability regression is
        # visible in the job output.
        run: |
          cargo build --release --features metal
          ./target/release/socrates docs/assets/metal_triangle.soc
      - name: Metal compute battery (hard-asserted bytes when a device exists)
        # gpu.run on the native Metal backend: an MSL doubling kernel whose
        # output bytes the script itself hard-asserts (assert_eq panics ->
        # exit 70 -> job fails) whenever a Metal device exists — compute
        # needs no window server, so on this runner it is a real
        # correctness gate. `err: <reason>` (no device) exits 0.
        run: ./target/release/socrates docs/assets/metal_compute.soc
      - name: glcube-Metal golden test (real rendered pixels, hard assert)
        # The cross-backend pixel-parity proof (the Metal arc's Phase 3):
        # main_metal.soc renders the same cube through the same gfx calls
        # as main.soc and is pinned to the IDENTICAL two frames / pixel
        # coordinates / expected bytes as the OpenGL version. Unlike the
        # smoke step above, this one hard-asserts: macos-14 runners have a
        # Metal-capable paravirtual GPU and a window server (proven by the
        # smoke step's ok-line since Phase 1), so a mismatch here is a real
        # rendering divergence, not a capability gap.
        run: ./target/release/socrates test demos/glcube/main_metal.soc demos/glcube/cube.soc demos/glcube/spec.soc

  vulkan:
    # The roadmap's second native compute backend -- raw dlopen FFI to
    # libvulkan, SPIR-V binaries ingested directly (the lingua-franca
    # decision). Mesa's lavapipe gives every ubuntu runner a software
    # compute device, so unlike metal/gl this backend is fully exercised on
    # plain CI hardware: the battery's assert_eq is a real correctness
    # gate, not a smoke test. Since the Vulkan graphics arc's Phase 0 the
    # same feature also carries the Linux window backend scaffolding
    # (window.create_vulkan, the x11/ gl-vs-vulkan enum split), so this
    # job additionally proves real GL/Vulkan coexistence: `--features
    # gl,vulkan` together, mirroring the gl-macos-metal job's gl,metal
    # builds. libx11-dev is needed for that half only (`--features gl`
    # links libX11 normally -- see the `gl` job's comment).
    name: Vulkan compute + window scaffolding (native, lavapipe)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable branch, resolved 2026-07-18
        with:
          components: clippy
      - name: Software Vulkan device (lavapipe) + X11 dev headers + Xvfb
        run: sudo apt-get update && sudo apt-get install -y libvulkan1 mesa-vulkan-drivers libx11-dev xvfb
      - name: Build (vulkan)
        run: cargo build --features vulkan
      - name: Clippy (vulkan, deny warnings)
        run: cargo clippy --features vulkan --all-targets -- -D warnings
      - name: Unit + golden spec tests (vulkan)
        run: cargo test --features vulkan
      - name: Build (gl,vulkan coexistence)
        run: cargo build --features gl,vulkan
      - name: Clippy (gl,vulkan, deny warnings)
        run: cargo clippy --features gl,vulkan --all-targets -- -D warnings
      - name: Unit + golden spec tests (gl,vulkan, under Xvfb)
        # Exercises both backends in one binary: the GL window smoke test
        # (create_clear_swap_poll_close) renders against Xvfb while the
        # x11::tests::create_vulkan_errs_cleanly test pins the Phase-0
        # create_vulkan Err through the same enum dispatch.
        run: |
          Xvfb :99 -screen 0 1024x768x24 &
          # xvfb-run is the standard tool, but this server is shared by
          # later steps in the job (glcube pins, doc snippets), so wait
          # on the display socket instead of a race-prone fixed sleep.
          for _ in $(seq 1 100); do [ -e /tmp/.X11-unix/X99 ] && break; sleep 0.1; done
          DISPLAY=:99 cargo test --features gl,vulkan
      - name: Zero dependencies (vulkan; gl,vulkan)
        run: |
          test "$(cargo tree -e normal --prefix none --features vulkan | wc -l)" -eq 1
          test "$(cargo tree -e normal --prefix none --features gl,vulkan | wc -l)" -eq 1
      - name: Vulkan compute battery (hard-asserted bytes)
        run: |
          cargo build --release --features vulkan
          ./target/release/socrates docs/assets/vulkan_compute.soc
      - name: glcube-Vulkan golden (real rendered pixels, hard assert)
        # The three-backend pixel-parity contract: main_vulkan.soc's
        # pins are byte-identical to main.soc's (OpenGL, the gl job) and
        # main_metal.soc's (Metal, the gl-macos-metal job). Explicit
        # files, not the directory — the GL and Metal twins can't render
        # in this job's environment. Xvfb from the gl,vulkan step is on
        # :99; lavapipe renders.
        run: DISPLAY=:99 ./target/release/socrates test demos/glcube/main_vulkan.soc demos/glcube/cube.soc demos/glcube/spec.soc
      - name: Vulkan triangle (SPIR-V gfx draw calls, hard-asserted pixel)
        # The full gfx.* surface on the Vulkan backend: hand-assembled
        # SPIR-V shaders through gfx.compile_program_spirv, reflection-
        # resolved uniforms, a real rasterized draw, and a read_pixels
        # center-pixel assert — a wrong color panics the program (exit
        # 70), failing this step. Xvfb from the gl,vulkan step is on :99.
        run: |
          out=$(DISPLAY=:99 ./target/release/socrates docs/assets/vulkan_triangle.soc)
          echo "$out"
          test "$out" = "ok: vulkan triangle drawn, center=[255, 128, 64, 255]"
      - name: Vulkan window smoke (real WSI presentation, hard-asserted)
        # window.create_vulkan opens a real window against lavapipe's
        # xlib-surface + swapchain path and presents three frames — the
        # exact ok line is asserted, so a silent fall-through to the err
        # branch fails the job. (Pixel-exactness of the presented clear is
        # asserted by window::x11::vulkan's XGetImage roundtrip unit test
        # in the gl,vulkan test step above; this asserts the Socrates-facing
        # surface.) Xvfb from the gl,vulkan step above is still on :99.
        run: |
          out=$(DISPLAY=:99 ./target/release/socrates docs/assets/vulkan_window.soc)
          echo "$out"
          test "$out" = "ok: vulkan window presented 3 frames (backend=vulkan, 320x240)"

  opencl:
    # The roadmap's third native compute backend -- raw dlopen FFI to the
    # libOpenCL ICD loader, SPIR-V kernels ingested via clCreateProgramWithIL
    # (OpenCL 2.1+ core). The kernels use the OpenCL SPIR-V profile
    # (Kernel/Physical64 -- SPEC section 7.2 documents both dialects; the
    # Vulkan-profile blob is NOT interchangeable). The Intel oneAPI CPU
    # runtime provides the IL-capable device (Debian's pocl build ships
    # WITHOUT the SPIR-V translator -- clinfo reports "IL version (n/a)"
    # and clCreateProgramWithIL returns CL_INVALID_VALUE, the exact err
    # PR #61's best-effort run recorded). pocl stays installed anyway:
    # two ICD platforms make cl.rs's device scoring (IL-capable first)
    # a real multi-platform test, not a single-choice formality. The
    # battery hard-asserts the exact ok line -- the program itself
    # additionally hard-asserts the output bytes whenever the dispatch
    # runs. The vulkan,opencl steps prove the native-precedence cfg maze
    # compiles both ways (the gpu::tests::opencl_defers_to_vulkan unit
    # test pins the precedence).
    name: OpenCL compute (native, Intel CPU runtime + pocl)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable branch, resolved 2026-07-18
        with:
          components: clippy
      - name: OpenCL runtime (pocl) + clinfo + X11 dev headers
        # libx11-dev is for the vulkan,opencl precedence build only: the
        # vulkan feature carries the Linux window backend, which links
        # libX11 normally (see the vulkan job's comment). No X server or
        # Vulkan loader is installed here -- those tests skip/Err cleanly.
        run: sudo apt-get update && sudo apt-get install -y ocl-icd-libopencl1 pocl-opencl-icd clinfo libx11-dev
      - name: Intel oneAPI CPU OpenCL runtime (the SPIR-V IL device)
        # SPIR-V IL ingestion on any x86_64 CPU -- what this Debian pocl
        # build lacks. Registered as a second ICD platform next to pocl.
        run: |
          wget -qO- https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB \
            | sudo gpg --dearmor -o /usr/share/keyrings/oneapi-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/oneapi-archive-keyring.gpg] https://apt.repos.intel.com/oneapi all main" \
            | sudo tee /etc/apt/sources.list.d/oneAPI.list
          sudo apt-get update && sudo apt-get install -y intel-oneapi-runtime-opencl
      - name: clinfo (device + IL-support diagnostics, best effort)
        run: clinfo || true
      - name: Build (opencl)
        run: cargo build --features opencl
      - name: Clippy (opencl, deny warnings)
        run: cargo clippy --features opencl --all-targets -- -D warnings
      - name: Unit + golden spec tests (opencl)
        run: cargo test --features opencl
      - name: Build + clippy + tests (vulkan,opencl precedence)
        run: |
          cargo build --features vulkan,opencl
          cargo clippy --features vulkan,opencl --all-targets -- -D warnings
          cargo test --features vulkan,opencl
      - name: Zero dependencies (opencl; vulkan,opencl)
        run: |
          test "$(cargo tree -e normal --prefix none --features opencl | wc -l)" -eq 1
          test "$(cargo tree -e normal --prefix none --features vulkan,opencl | wc -l)" -eq 1
      - name: OpenCL compute battery (real SPIR-V dispatch, hard-asserted bytes)
        # The exact ok line is asserted, so a silent fall-through to the
        # err branch fails the job; the program itself also hard-asserts
        # the doubled bytes (a wrong result panics, exit 70).
        run: |
          cargo build --release --features opencl
          out=$(./target/release/socrates docs/assets/opencl_compute.soc)
          echo "$out"
          test "$out" = "ok: [2, 0, 0, 0, 4, 0, 0, 0, 6, 0, 0, 0, 8, 0, 0, 0, 10, 0, 0, 0, 12, 0, 0, 0, 14, 0, 0, 0, 200, 0, 0, 0]"

  cuda:
    # The roadmap's fourth native compute backend -- raw dlopen FFI to
    # NVIDIA's driver (libcuda), PTX text JIT'd at cuModuleLoadData time
    # (no CUDA toolkit anywhere). BLIND-DEV COVERAGE, honestly labeled:
    # no software CUDA implementation exists and no runner has NVIDIA
    # hardware, so this job proves compilation, clippy, the graceful
    # no-driver paths (the battery's exact err line is pinned), the
    # precedence cfg lattice both ways, and zero-dependency-ness. The
    # battery program hard-asserts its bytes the first time real NVIDIA
    # hardware runs it. libx11-dev is for the vulkan,cuda build only
    # (the vulkan feature carries the Linux window backend, which links
    # libX11 normally).
    name: CUDA compute (native, driverless graceful paths)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable branch, resolved 2026-07-18
        with:
          components: clippy
      - name: X11 dev headers (for the vulkan,cuda build)
        run: sudo apt-get update && sudo apt-get install -y libx11-dev
      - name: Build (cuda)
        run: cargo build --features cuda
      - name: Clippy (cuda, deny warnings)
        run: cargo clippy --features cuda --all-targets -- -D warnings
      - name: Unit + golden spec tests (cuda)
        run: cargo test --features cuda
      - name: Build + clippy + tests (vulkan,cuda and cuda,opencl precedence)
        run: |
          cargo build --features vulkan,cuda
          cargo clippy --features vulkan,cuda --all-targets -- -D warnings
          cargo test --features vulkan,cuda
          cargo build --features cuda,opencl
          cargo clippy --features cuda,opencl --all-targets -- -D warnings
          cargo test --features cuda,opencl
      - name: Zero dependencies (cuda; vulkan,cuda; cuda,opencl)
        run: |
          test "$(cargo tree -e normal --prefix none --features cuda | wc -l)" -eq 1
          test "$(cargo tree -e normal --prefix none --features vulkan,cuda | wc -l)" -eq 1
          test "$(cargo tree -e normal --prefix none --features cuda,opencl | wc -l)" -eq 1
      - name: CUDA battery (graceful no-driver path, exact err line pinned)
        # On a GPU-less runner the battery must take the err branch with
        # exactly this message -- a silent behavior change (or GitHub
        # runners growing NVIDIA hardware) breaks the assert visibly, at
        # which point this flips to asserting the ok bytes.
        run: |
          cargo build --release --features cuda
          out=$(./target/release/socrates docs/assets/cuda_compute.soc)
          echo "$out"
          test "$out" = "err: gpu.run: no CUDA driver (libcuda) on this system"

  d3d12:
    # The roadmap's fifth native compute backend -- COM-vtable FFI to
    # runtime-loaded d3d12/dxgi/d3dcompiler_47 system DLLs, HLSL compiled
    # by the OS's own compiler at dispatch time. WARP (Windows' software
    # D3D12 adapter) guarantees a device on every windows runner, so like
    # the vulkan (lavapipe) and opencl (Intel CPU runtime) jobs this
    # battery hard-asserts REAL dispatched bytes -- no GPU anywhere. The
    # pair builds prove the precedence lattice on the platform where
    # d3d12 exists (vulkan > d3d12 > cuda; unit tests pin each).
    name: D3D12 compute (native, WARP)
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable branch, resolved 2026-07-18
        with:
          components: clippy
      - name: Build (d3d12)
        run: cargo build --features d3d12
      - name: Clippy (d3d12, deny warnings)
        run: cargo clippy --features d3d12 --all-targets -- -D warnings
      - name: Unit + golden spec tests (d3d12)
        run: cargo test --features d3d12
      - name: Build + clippy + tests (vulkan,d3d12 and d3d12,cuda precedence)
        shell: bash
        run: |
          cargo build --features vulkan,d3d12
          cargo clippy --features vulkan,d3d12 --all-targets -- -D warnings
          cargo test --features vulkan,d3d12
          cargo build --features d3d12,cuda
          cargo clippy --features d3d12,cuda --all-targets -- -D warnings
          cargo test --features d3d12,cuda
      - name: Zero dependencies (d3d12; vulkan,d3d12; d3d12,cuda)
        shell: bash
        run: |
          test "$(cargo tree -e normal --prefix none --features d3d12 | wc -l)" -eq 1
          test "$(cargo tree -e normal --prefix none --features vulkan,d3d12 | wc -l)" -eq 1
          test "$(cargo tree -e normal --prefix none --features d3d12,cuda | wc -l)" -eq 1
      - name: D3D12 compute battery (real WARP dispatch, hard-asserted bytes)
        # The exact ok line is asserted, so a silent fall-through to the
        # err branch fails the job; the program itself also hard-asserts
        # the doubled bytes (a wrong result panics, exit 70).
        shell: bash
        run: |
          cargo build --release --features d3d12
          out=$(./target/release/socrates.exe docs/assets/d3d12_compute.soc)
          echo "$out"
          test "$out" = "ok: [2, 0, 0, 0, 4, 0, 0, 0, 6, 0, 0, 0, 8, 0, 0, 0, 10, 0, 0, 0, 12, 0, 0, 0, 14, 0, 0, 0, 200, 0, 0, 0]"

  demo-zoo:
    # Proves the release's cross-compile + `socrates build` stapling works on
    # every non-native target before a release is ever cut (x86_64-linux is
    # covered by the `test` job's build smoke). For a target whose arch
    # matches the runner, a stapled demo is run and diffed against its source
    # run; for a true cross target we can only build + staple (no execution),
    # which is exactly what the release does. Zero-dependency pure Rust makes
    # these cross-builds need nothing but the rustup target (+ a linker for
    # aarch64 GNU); rustc locates the MSVC ARM64 tools itself.
    name: Demo zoo (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            label: aarch64-linux
            ext: ""
            apt: gcc-aarch64-linux-gnu
            linker: aarch64-linux-gnu-gcc
            run: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: x86_64-windows
            ext: ".exe"
            run: true
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            label: aarch64-windows
            ext: ".exe"
            run: false
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable branch, resolved 2026-07-18
        with:
          targets: ${{ matrix.target }}
      - name: Cross linker (aarch64 linux)
        if: matrix.apt != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt }}
      - name: Build host stapler
        run: cargo build --release
      - name: Build target launcher
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker }}
        run: cargo build --release --target ${{ matrix.target }}
      - name: Staple + verify
        shell: bash
        run: |
          host="target/release/socrates${{ matrix.ext }}"
          launcher="target/${{ matrix.target }}/release/socrates${{ matrix.ext }}"
          for demo in csvql parmandel; do
            "$host" build "demos/$demo" --launcher "$launcher" -o "${demo}${{ matrix.ext }}"
            test -s "${demo}${{ matrix.ext }}" || { echo "no binary produced for $demo" >&2; exit 1; }
          done
          if [ "${{ matrix.run }}" = "true" ]; then
            # Native arch: the stapled binary runs here — prove it reproduces
            # the source run byte-for-byte.
            for demo in csvql parmandel; do
              ( ./"${demo}${{ matrix.ext }}" ) > "${demo}.bin.out"
              "$host" "demos/$demo/main.soc" > "${demo}.src.out"
              diff "${demo}.src.out" "${demo}.bin.out"
            done
            echo "ran and matched source on ${{ matrix.label }}"
          else
            echo "cross-built and stapled ${{ matrix.label }} (no native execution)"
          fi

  macos-singlefile:
    # macOS can't use the append trick (a payload past the Mach-O __LINKEDIT
    # fails codesign, and arm64 macOS won't run unsigned), so a single-file
    # binary is built by linking the payload in as a `__DATA,__socrateszoo`
    # section (`ld -sectcreate`). This proves the whole chain on Apple Silicon:
    # emit the payload, link it in, sign, and run — matching the source run.
    name: macOS single-file demo (aarch64)
    # Dual-image per the gl-macos note (deprecated != discontinued).
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable branch, resolved 2026-07-18
      - name: Spec + demo golden suites on Apple Silicon
        # demos/glcube/main.soc needs a live GL context (this job builds
        # without --features gl) — see the `gl`/`gl-macos` jobs' own
        # exclusion of the same demo for the same reason.
        run: |
          shopt -s extglob
          cargo build --release
          ./target/release/socrates test tests/spec demos/!(glcube)/ demos/glcube/cube.soc demos/glcube/spec.soc > /dev/null
      - name: Build, sign, and run a section-embedded demo binary
        run: |
          host="target/release/socrates"                       # payload emitter
          for demo in csvql parmandel; do
            "$host" build "demos/$demo" --payload-only -o "$PWD/$demo.payload"
            RUSTFLAGS="-Clink-arg=-Wl,-sectcreate,__DATA,__socrateszoo,$PWD/$demo.payload" \
              cargo build --release --target aarch64-apple-darwin
            cp "target/aarch64-apple-darwin/release/socrates" "./$demo-bin"
            codesign --force --sign - "./$demo-bin"
            codesign --verify --strict "./$demo-bin"
            ( ./"$demo-bin" ) > "$demo.bin.out"
            "$host" "demos/$demo/main.soc" > "$demo.src.out"
            diff "$demo.src.out" "$demo.bin.out"
          done
          echo "section-embedded macOS binaries sign, run, and match source"
