name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Build
        run: cargo build --all-targets
      - name: Unit + golden spec tests
        run: cargo test
      - name: Golden spec tests under GC stress
        run: FABLE_GC_STRESS=1 cargo test --test spec_runner
      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings
      - name: Examples smoke test
        run: |
          cargo build --release
          ./target/release/fable examples/mandelbrot.fable > /dev/null
          ./target/release/fable examples/algorithms.fable > /dev/null
          ./target/release/fable examples/life.fable > /dev/null
          ./target/release/fable examples/brainfuck.fable > /dev/null
          ./target/release/fable examples/json.fable > /dev/null
          ./target/release/fable examples/adventure.fable < /dev/null > /dev/null
          ./target/release/fable examples/orbit/main.fable > /dev/null
          ./target/release/fable examples/loc.fable . > /dev/null
          ./target/release/fable check examples/raytracer.fable
          ./target/release/fable test tests/spec > /dev/null
      - name: Demo golden tests
        run: ./target/release/fable test demos > /dev/null
      - name: FFT numpy cross-check
        run: |
          python3 -m pip install --quiet numpy
          python3 tools/fft_crosscheck.py ./target/release/fable
      - name: pyl layer golden tests + SOS freeze check
        run: |
          FABLE_PATH=ports ./target/release/fable test ports/pyl/spec.fable
          FABLE_GC_STRESS=1 FABLE_PATH=ports ./target/release/fable test ports/pyl/spec.fable
          FABLE_PATH=ports ./target/release/fable ports/pyl/check_freeze.fable
          python3 -m pip install --quiet scipy
          python3 ports/claudewave/reference/check_sos_vs_scipy.py ports/claudewave/reference/sos_freeze.txt
      - name: ICAA port golden tests
        run: FABLE_PATH=ports ./target/release/fable test ports/icaa/spec.fable
      - name: ICAA port cross-validation (Fable vs JS reference)
        run: |
          mkdir -p /tmp/icaa-scenes
          FABLE_PATH=ports ./target/release/fable ports/icaa/scenes.fable /tmp/icaa-scenes > /dev/null
          for scene in /tmp/icaa-scenes/*.ppm; do
            name=$(basename "$scene" .ppm)
            for preset in quality fast; do
              node ports/icaa/reference/icaa-cpu.mjs "$scene" "/tmp/icaa-scenes/${name}_${preset}_js.ppm" "$preset"
              FABLE_PATH=ports ./target/release/fable ports/icaa/main.fable "$scene" "/tmp/icaa-scenes/${name}_${preset}_fb.ppm" "$preset"
              node ports/icaa/reference/compare.mjs "/tmp/icaa-scenes/${name}_${preset}_js.ppm" "/tmp/icaa-scenes/${name}_${preset}_fb.ppm"
            done
          done
