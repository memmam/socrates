name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Build
        run: cargo build --all-targets
      - name: Zero dependencies in the default build
        # The default build must stay dependency-free: the tree is exactly
        # one line (this crate). The gpu feature is the only, opt-in exception.
        run: test "$(cargo tree -e normal --prefix none | wc -l)" -eq 1
      - name: Unit + golden spec tests
        run: cargo test
      - name: Golden spec tests under GC stress
        run: FABLE_GC_STRESS=1 cargo test --test spec_runner
      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings
      - name: Examples smoke test
        run: |
          cargo build --release
          ./target/release/fable examples/mandelbrot.fable > /dev/null
          ./target/release/fable examples/algorithms.fable > /dev/null
          ./target/release/fable examples/life.fable > /dev/null
          ./target/release/fable examples/brainfuck.fable > /dev/null
          ./target/release/fable examples/json.fable > /dev/null
          ./target/release/fable examples/adventure.fable < /dev/null > /dev/null
          ./target/release/fable examples/orbit/main.fable > /dev/null
          ./target/release/fable examples/loc.fable . > /dev/null
          ./target/release/fable check examples/raytracer.fable
          ./target/release/fable test tests/spec > /dev/null
      - name: Demo golden tests
        run: ./target/release/fable test demos > /dev/null
      - name: Self-contained demo binary (fable build)
        # Staple a data-reading demo and a worker demo into standalone
        # binaries and prove each reproduces its source run byte-for-byte
        # from an unrelated working directory.
        run: |
          for demo in csvql parmandel; do
            ./target/release/fable build "demos/$demo" -o "/tmp/$demo-bin"
            ( cd /tmp && "/tmp/$demo-bin" ) > "/tmp/$demo-bin.out"
            ./target/release/fable "demos/$demo/main.fable" > "/tmp/$demo-src.out"
            diff "/tmp/$demo-src.out" "/tmp/$demo-bin.out"
          done
      - name: FFT numpy cross-check
        run: |
          python3 -m pip install --quiet numpy
          python3 tools/fft_crosscheck.py ./target/release/fable
      - name: pyl layer golden tests + SOS freeze check
        run: |
          FABLE_PATH=ports ./target/release/fable test ports/pyl/spec.fable
          FABLE_GC_STRESS=1 FABLE_PATH=ports ./target/release/fable test ports/pyl/spec.fable
          FABLE_PATH=ports ./target/release/fable ports/pyl/check_freeze.fable
          python3 -m pip install --quiet scipy
          python3 ports/claudewave/reference/check_sos_vs_scipy.py ports/claudewave/reference/sos_freeze.txt
      - name: claudewave port cross-validation (Fable vs shim-run upstream)
        run: |
          mkdir -p /tmp/cw
          python3 ports/claudewave/reference/gen_stream.py /tmp/cw/rand_stream.txt
          CLAUDEWAVE_STREAM=/tmp/cw/rand_stream.txt python3 ports/claudewave/reference/run_upstream.py /tmp/cw/truth
          FABLE_PATH=ports CLAUDEWAVE_STREAM=/tmp/cw/rand_stream.txt ./target/release/fable ports/claudewave/battery.fable /tmp/cw/fable
          n=$(ls /tmp/cw/truth/*.paw | wc -l)
          test "$n" -eq 32 || { echo "expected 32 battery items, got $n"; exit 1; }
          for p in /tmp/cw/truth/*.paw; do
            name=$(basename "$p")
            echo "== $name"
            python3 ports/claudewave/reference/compare_paw.py "$p" "/tmp/cw/fable/$name" || exit 1
          done
          diff /tmp/cw/truth/chords.txt /tmp/cw/fable/chords.txt
      - name: ICAA port golden tests
        run: FABLE_PATH=ports ./target/release/fable test ports/icaa/spec.fable
      - name: ICAA port cross-validation (Fable vs JS reference)
        run: |
          mkdir -p /tmp/icaa-scenes
          FABLE_PATH=ports ./target/release/fable ports/icaa/scenes.fable /tmp/icaa-scenes > /dev/null
          for scene in /tmp/icaa-scenes/*.ppm; do
            name=$(basename "$scene" .ppm)
            for preset in quality fast; do
              node ports/icaa/reference/icaa-cpu.mjs "$scene" "/tmp/icaa-scenes/${name}_${preset}_js.ppm" "$preset"
              FABLE_PATH=ports ./target/release/fable ports/icaa/main.fable "$scene" "/tmp/icaa-scenes/${name}_${preset}_fb.ppm" "$preset"
              node ports/icaa/reference/compare.mjs "/tmp/icaa-scenes/${name}_${preset}_js.ppm" "/tmp/icaa-scenes/${name}_${preset}_fb.ppm"
            done
          done

  gpu:
    name: GPU feature (wgpu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Build (gpu)
        run: cargo build --features gpu
      - name: Clippy (gpu, deny warnings)
        run: cargo clippy --features gpu --all-targets -- -D warnings
      - name: Unit + golden spec tests (gpu)
        run: cargo test --features gpu
      - name: Software Vulkan adapter (lavapipe) — best effort
        # The demo below must pass with or without this succeeding.
        run: sudo apt-get update && sudo apt-get install -y mesa-vulkan-drivers || true
      - name: GPU demo (exits 0 with or without an adapter)
        # Prints `ok: <bytes>` under lavapipe, `err: no adapter ...` when the
        # driver install failed — both are expected; assert only exit 0.
        run: |
          cargo build --release --features gpu
          ./target/release/fable docs/assets/gpu_double.fable

  gl:
    name: window feature (X11/GLX)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install X11 dev headers + Xvfb
        # `--features gl` links against libX11 normally (see src/window/x11.rs's
        # module docs): that needs the unversioned `libX11.so` dev symlink,
        # which `libx11-dev` provides — the bare runtime lib alone (already on
        # any desktop image) isn't enough for the linker to find `-lX11`.
        run: sudo apt-get update && sudo apt-get install -y libx11-dev xvfb
      - name: Build (gl)
        run: cargo build --features gl
      - name: Clippy (gl, deny warnings)
        run: cargo clippy --features gl --all-targets -- -D warnings
      - name: Unit + golden spec tests (gl, under Xvfb)
        run: |
          Xvfb :99 -screen 0 1024x768x24 &
          sleep 1
          DISPLAY=:99 cargo test --features gl

  gl-windows:
    name: window feature (Win32/WGL)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Build (gl)
        run: cargo build --features gl
      - name: Clippy (gl, deny warnings)
        run: cargo clippy --features gl --all-targets -- -D warnings
      - name: Unit + golden spec tests (gl)
        # windows-latest is a real Windows machine (unlike the `gl` job's
        # Xvfb-under-Linux stand-in), so `win32.rs`'s smoke test creates and
        # drives an actual window/WGL context here.
        run: cargo test --features gl

  gl-macos:
    # Real Apple Silicon hardware (unlike this repo's own dev/CI containers,
    # which are Linux) — the only environment that can actually link and run
    # `src/window/macos.rs`'s Cocoa/NSOpenGL FFI. Mirrors the `gl` (Linux)
    # job's steps one-for-one; there's no equivalent of Xvfb needed here
    # since `cargo test --features gl` on macOS runs against the real
    # window server, and `macos.rs`'s test skips gracefully if that's
    # restricted in this environment (see its module docs).
    name: window feature (Cocoa/NSOpenGL, Apple Silicon)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Build (gl)
        run: cargo build --features gl
      - name: Clippy (gl, deny warnings)
        run: cargo clippy --features gl --all-targets -- -D warnings
      - name: Unit + golden spec tests (gl)
        # This is the real pass/fail gate -- plain `cargo test --features gl`,
        # normal exit-code semantics, no masking. A previous [debug] version
        # of this step wrapped the run in `lldb ... || true` for diagnostics
        # and that `|| true` silently converted a real failure to green: the
        # `find`-based TEST_BIN lookup matched a stray incremental-build
        # `*.rcgu.o` object file instead of the actual test executable (an
        # object file isn't runnable -- lldb's `run` failed with "Permission
        # denied"), so the crashing test never actually ran that time, and
        # the job reported success on a run that tested nothing. Keep this
        # step honest and ungated; do the lldb bisection separately below.
        run: cargo test --features gl
      - name: "Unit + golden spec tests (gl) [debug: lldb re-run on failure]"
        # Only runs if the real gate above failed. Re-identifies the test
        # binary robustly via --message-format=json (the target.kind=="lib"
        # compiler-artifact's own `executable` field -- unambiguous, unlike
        # a `find`/`head -1` glob over target/debug/deps, which also
        # contains per-codegen-unit *.rcgu.o objects and a second, unrelated
        # `fable-*` binary for src/main.rs's own unit tests). Breaks on
        # objc_exception_throw() -- the one universal, synchronous
        # interception point every Objective-C raise funnels through, before
        # any unwinding starts (the same technique crash reporters use) --
        # since NSSetUncaughtExceptionHandler doesn't work here: that hook
        # only fires once an exception has fully unwound to the top
        # uncaught-exception handler, and Rust's own foreign-exception guard
        # aborts the process mid-unwind before that point is ever reached.
        if: failure()
        run: |
          cargo test --features gl --no-run --message-format=json > /tmp/cargo-test-build.json
          TEST_BIN=$(python3 -c "
          import json
          with open('/tmp/cargo-test-build.json') as f:
              for line in f:
                  line = line.strip()
                  if not line:
                      continue
                  obj = json.loads(line)
                  if obj.get('reason') != 'compiler-artifact' or not obj.get('executable'):
                      continue
                  target = obj.get('target', {})
                  if target.get('name') == 'fable' and 'lib' in target.get('kind', []):
                      print(obj['executable'])
          ")
          if [ -z "$TEST_BIN" ]; then
            echo "::error::could not identify the lib-unittests binary from cargo's build metadata"
            exit 1
          fi
          echo "test binary: $TEST_BIN"
          lldb -b \
            -o "breakpoint set -n objc_exception_throw" \
            -o "run --test-threads=1 --nocapture" \
            -o "po \$x0" \
            -o "bt" \
            -o "continue" \
            -- "$TEST_BIN"

  demo-zoo:
    # Proves the release's cross-compile + `fable build` stapling works on
    # every non-native target before a release is ever cut (x86_64-linux is
    # covered by the `test` job's build smoke). For a target whose arch
    # matches the runner, a stapled demo is run and diffed against its source
    # run; for a true cross target we can only build + staple (no execution),
    # which is exactly what the release does. Zero-dependency pure Rust makes
    # these cross-builds need nothing but the rustup target (+ a linker for
    # aarch64 GNU); rustc locates the MSVC ARM64 tools itself.
    name: Demo zoo (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            label: aarch64-linux
            ext: ""
            apt: gcc-aarch64-linux-gnu
            linker: aarch64-linux-gnu-gcc
            run: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: x86_64-windows
            ext: ".exe"
            run: true
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            label: aarch64-windows
            ext: ".exe"
            run: false
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Cross linker (aarch64 linux)
        if: matrix.apt != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt }}
      - name: Build host stapler
        run: cargo build --release
      - name: Build target launcher
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker }}
        run: cargo build --release --target ${{ matrix.target }}
      - name: Staple + verify
        shell: bash
        run: |
          host="target/release/fable${{ matrix.ext }}"
          launcher="target/${{ matrix.target }}/release/fable${{ matrix.ext }}"
          for demo in csvql parmandel; do
            "$host" build "demos/$demo" --launcher "$launcher" -o "${demo}${{ matrix.ext }}"
            test -s "${demo}${{ matrix.ext }}" || { echo "no binary produced for $demo" >&2; exit 1; }
          done
          if [ "${{ matrix.run }}" = "true" ]; then
            # Native arch: the stapled binary runs here — prove it reproduces
            # the source run byte-for-byte.
            for demo in csvql parmandel; do
              ( ./"${demo}${{ matrix.ext }}" ) > "${demo}.bin.out"
              "$host" "demos/$demo/main.fable" > "${demo}.src.out"
              diff "${demo}.src.out" "${demo}.bin.out"
            done
            echo "ran and matched source on ${{ matrix.label }}"
          else
            echo "cross-built and stapled ${{ matrix.label }} (no native execution)"
          fi

  macos-singlefile:
    # macOS can't use the append trick (a payload past the Mach-O __LINKEDIT
    # fails codesign, and arm64 macOS won't run unsigned), so a single-file
    # binary is built by linking the payload in as a `__DATA,__fablezoo`
    # section (`ld -sectcreate`). This proves the whole chain on Apple Silicon:
    # emit the payload, link it in, sign, and run — matching the source run.
    name: macOS single-file demo (aarch64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Spec + demo golden suites on Apple Silicon
        run: cargo build --release && ./target/release/fable test tests/spec demos > /dev/null
      - name: Build, sign, and run a section-embedded demo binary
        run: |
          host="target/release/fable"                       # payload emitter
          for demo in csvql parmandel; do
            "$host" build "demos/$demo" --payload-only -o "$PWD/$demo.payload"
            RUSTFLAGS="-Clink-arg=-Wl,-sectcreate,__DATA,__fablezoo,$PWD/$demo.payload" \
              cargo build --release --target aarch64-apple-darwin
            cp "target/aarch64-apple-darwin/release/fable" "./$demo-bin"
            codesign --force --sign - "./$demo-bin"
            codesign --verify --strict "./$demo-bin"
            ( ./"$demo-bin" ) > "$demo.bin.out"
            "$host" "demos/$demo/main.fable" > "$demo.src.out"
            diff "$demo.src.out" "$demo.bin.out"
          done
          echo "section-embedded macOS binaries sign, run, and match source"
