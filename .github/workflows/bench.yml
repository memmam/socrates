name: Bench A/B

# The universal-performance gate for interpreter/idiom changes (CLAUDE.md's
# universality principle): an interleaved A/B between two refs, run on one
# runner per tier-1 architecture. A simplification is accepted only if no
# architecture regresses beyond the noise floor — "fast on the dev box" is
# one vote, not a verdict.
#
# Two ways in: by hand (Actions -> Bench A/B -> Run workflow) with the
# branch under test, or — for branch-scoped actors that cannot dispatch
# workflows (403), the same constraint the Release workflow's
# RELEASE_TAG path solves — push the candidate as a `bench/<name>`
# branch: the pushed ref is the head side, the base is `main` unless
# the pushed ref carries a `bench/BASE` file naming another ref (for
# A/B'ing a candidate against something that isn't main — e.g. a
# robustness probe of change X on top of change Y, judged against Y).
# The workflow file is read from the pushed ref, so the branch must
# contain it (merge main in when benching an older branch). Each job
# posts its delta table to the run's summary page.

on:
  push:
    branches: ["bench/**"]
  workflow_dispatch:
    inputs:
      head_ref:
        description: "Ref under test (branch/sha)"
        required: true
      base_ref:
        description: "Baseline ref"
        required: false
        default: "main"
      micro_n:
        description: "Interleaved rounds per micro bench"
        required: false
        default: "5"
      macro_n:
        description: "Interleaved rounds per macro bench"
        required: false
        default: "3"
      targets:
        description: "Comma-separated target filter (empty = all)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  ab:
    name: A/B ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: x86_64-linux
          - os: ubuntu-24.04-arm
            label: aarch64-linux
          - os: windows-latest
            label: x86_64-windows
          - os: macos-14
            label: aarch64-macos
    steps:
      - name: Checkout head
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.head_ref || github.ref }}
          path: head
      - name: Resolve base ref
        id: baseref
        shell: bash
        run: |
          if [ -n "${{ inputs.base_ref }}" ]; then
            ref='${{ inputs.base_ref }}'
          elif [ -f head/bench/BASE ]; then
            ref=$(tr -d '[:space:]' < head/bench/BASE)
          else
            ref=main
          fi
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
      - name: Checkout base
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.baseref.outputs.ref }}
          path: base
      - uses: dtolnay/rust-toolchain@stable
      - name: Build both sides
        shell: bash
        run: |
          cargo build --release --manifest-path base/Cargo.toml
          cargo build --release --manifest-path head/Cargo.toml
      - name: Compare binaries
        shell: bash
        run: |
          # Cross-epoch bridge (permanent, mirrors bench/ab.py's): a
          # pre-rename ref builds `fable`, a post-rename ref builds
          # `socrates` — resolve each side's binary independently so the
          # 2026-07 rename commit itself (and any later ref vs. any
          # earlier one) can be A/B'd.
          find_bin() {
            for n in socrates fable; do
              for x in "" .exe; do
                if [ -f "$1/target/release/$n$x" ]; then
                  echo "$1/target/release/$n$x"; return 0
                fi
              done
            done
            echo "no release binary under $1/target/release" >&2; return 1
          }
          b=$(find_bin base); h=$(find_bin head)
          if cmp -s "$b" "$h"; then verdict="BIT-IDENTICAL"; else verdict="DIFFER"; fi
          echo "binaries: $verdict"
          echo "**binaries: $verdict**" >> "$GITHUB_STEP_SUMMARY"
      - name: Interleaved A/B
        shell: bash
        run: |
          python3 head/bench/ab.py base head \
            --micro-n "${{ inputs.micro_n || '5' }}" \
            --macro-n "${{ inputs.macro_n || '3' }}" \
            --targets "${{ inputs.targets || '' }}" | tee ab.md
          {
            echo "## ${{ matrix.label }} — ${{ inputs.head_ref || github.ref_name }} vs ${{ steps.baseref.outputs.ref }}"
            cat ab.md
          } >> "$GITHUB_STEP_SUMMARY"
