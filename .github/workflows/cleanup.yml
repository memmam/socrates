name: Branch cleanup

# The branch-scoped-actor pattern release.yml documents, applied to
# deletions: the official path (`git push --delete` from the session)
# is blocked because the session App's credentials can create refs but
# not delete them (the git proxy 403s ref deletion), so a cleanup lands
# as a PR editing .github/CLEANUP_BRANCHES and CI — which holds
# contents: write — performs the deletions after the merge. Re-check
# this workaround whenever the App's permission scope changes (same
# 403 boundary bench/RESULTS.md's empty-commit resampling note
# records). Guards: main, archive/*, and claude/* are never deleted,
# ever; absent branches are skipped; per-branch failures are reported,
# not fatal.
#
# After each run, resolved entries (deleted this run, or already
# absent) are pruned from CLEANUP_BRANCHES; the trim goes out as its
# own small PR rather than a direct push to main, because main's own
# branch protection ("changes must be made through a pull request",
# "Test (stable)" required) rejects a direct push outright — proven
# live 2026-07-19 (see HISTORY.md): the first real run deleted its 19
# branches cleanly but the direct-push prune attempt hit a hard GH013
# rejection, exactly the failure mode the original version of this
# comment flagged as unproven. A resolved name left in the file is a
# real hazard, not just clutter: once some unrelated future branch
# reuses that name, the *next* cleanup run would delete it on sight,
# with nobody having reviewed that specific deletion. Comments, failed
# entries, and protected lines are left in place; merging the prune PR
# is a human decision like every other PR here, but since it can only
# ever remove already-resolved lines, review is a formality, not a
# judgment call. If a prune PR from a still-open run is why this run's
# PR looks like it duplicates one, that's expected — merge whichever
# in whatever order, each only removes lines it independently confirmed
# resolved.
on:
  push:
    branches: [main]
    paths: [".github/CLEANUP_BRANCHES"]

permissions:
  contents: write
  pull-requests: write

# Serialize cleanups; never cancel one mid-deletion.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  cleanup:
    name: Delete listed branches
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - name: Delete branches listed in .github/CLEANUP_BRANCHES
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -u
          deleted=0; skipped=0; failed=0
          deleted_names=""
          # A full snapshot of live heads, checked by exact line match below --
          # not `git ls-remote --heads origin "$b"` per-branch, which pattern-
          # matches loosely enough that a bare name can false-positive against
          # an unrelated nested ref (e.g. "h2-small-list" against
          # "archive/h2-small-list"), reporting a branch present when it isn't.
          live="$(git ls-remote --heads origin | awk '{sub("refs/heads/", "", $2); print $2}')"
          tmpfile="$(mktemp)"
          while IFS= read -r line || [ -n "$line" ]; do
            b="$(printf '%s' "$line" | tr -d '[:space:]')"
            case "$b" in
              ''|'#'*)
                printf '%s\n' "$line" >> "$tmpfile"; continue ;;
              main|archive/*|claude/*)
                echo "PROTECTED, refusing: $b"; skipped=$((skipped+1))
                printf '%s\n' "$line" >> "$tmpfile"; continue ;;
            esac
            if printf '%s\n' "$live" | grep -qxF "$b"; then
              if git push origin --delete "$b"; then
                echo "deleted: $b"; deleted=$((deleted+1))
                deleted_names="$deleted_names- $b
          "
              else
                echo "FAILED: $b"; failed=$((failed+1))
                printf '%s\n' "$line" >> "$tmpfile"
              fi
            else
              echo "absent, skipping: $b"; skipped=$((skipped+1))
            fi
          done < .github/CLEANUP_BRANCHES
          echo "== cleanup: $deleted deleted, $skipped skipped, $failed failed =="

          if ! cmp -s "$tmpfile" .github/CLEANUP_BRANCHES; then
            cp "$tmpfile" .github/CLEANUP_BRANCHES
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            prune_branch="cleanup/prune-${GITHUB_RUN_ID}"
            git checkout -b "$prune_branch"
            git add .github/CLEANUP_BRANCHES
            git commit -m "Prune resolved entries from CLEANUP_BRANCHES

          Removes branch names that were just deleted or found already
          absent this run, so a name doesn't sit here as a hazard for
          whatever unrelated branch reuses it later. Failed entries,
          comments, and protected lines are left in place."
            if git push origin "$prune_branch"; then
              gh pr create --base main --head "$prune_branch" \
                --title "Prune resolved CLEANUP_BRANCHES entries" \
                --body "Automated follow-up to this run's cleanup. Branches actually deleted this run:

          ${deleted_names}
          Their now-resolved entries are removed from \`.github/CLEANUP_BRANCHES\` so a future unrelated branch reusing one of these names is never silently swept up by a stale entry. Failed entries, comments, and protected lines are untouched. Safe to merge once \`Test (stable)\` is green -- this only ever removes lines this run independently confirmed resolved." \
                || echo "PR creation failed (entries will just carry over to the next run)"
            else
              echo "prune-branch push failed (entries will just carry over to the next run)"
            fi
          fi
          rm -f "$tmpfile"

          [ "$failed" -eq 0 ]
