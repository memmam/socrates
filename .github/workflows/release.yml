name: Release

# Three ways in, same result — a DRAFT release to publish by hand:
#   * push a tag like v0.6.0,
#   * run this workflow manually (Actions -> Release -> Run workflow)
#     with the tag name as input, or
#   * land a change to .github/RELEASE_TAG on main containing the tag
#     name — the release-by-pull-request path, for actors whose access
#     is branch-scoped (a PR is the only ref they can move).
# In the latter two, `gh release create` mints the tag at the built
# commit as part of drafting the release.
#
# The `build` matrix cross-compiles the interpreter for five desktop
# targets and, on each, staples every demo into a self-contained binary
# (the "demo zoo") with `socrates build`. Stapling is host-independent byte
# work — a host `socrates` reads the target launcher from a file — so the
# whole zoo for a target is assembled on that target's runner without
# ever executing the cross-built binary. The x86_64-linux job also runs
# the full validation suite; if it fails, its artifacts are never
# uploaded and the release step refuses to draft.

on:
  push:
    tags: ["v*"]
    branches: [main]
    paths: [".github/RELEASE_TAG"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create (e.g. v0.6.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            label: x86_64-linux
            ext: ""
            validate: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            label: aarch64-linux
            ext: ""
            apt: gcc-aarch64-linux-gnu
            linker: aarch64-linux-gnu-gcc
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: x86_64-windows
            ext: ".exe"
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            label: aarch64-windows
            ext: ".exe"
          - os: macos-14
            target: aarch64-apple-darwin
            label: aarch64-macos
            ext: ""
            # macOS can't append (a payload past __LINKEDIT fails codesign),
            # so each demo binary is built by linking the payload in as a
            # `__DATA,__socrateszoo` section. Signs ad-hoc by default; upgrades
            # to Developer ID + notarization when the signing secrets exist.
            macos_section: true
    env:
      TAG: pending
    steps:
      - uses: actions/checkout@v5

      - name: Resolve tag
        shell: bash
        env:
          EVENT: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ "$EVENT" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
          elif [ "$GITHUB_REF" = "refs/heads/main" ]; then
            TAG="$(head -1 .github/RELEASE_TAG | tr -d '[:space:]')"
          else
            TAG="$GITHUB_REF_NAME"
          fi
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "releasing $TAG for ${{ matrix.label }}"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cross linker (aarch64 linux)
        if: matrix.apt != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt }}

      - name: Build host stapler
        # A host-runnable `socrates` to run `socrates build` on this runner. On a
        # native-arch target this is redundant with the launcher, but keeping
        # the step uniform across native and cross targets is worth the few
        # extra seconds.
        run: cargo build --release

      - name: Build target launcher
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Validate (x86_64-linux only)
        if: matrix.validate
        run: |
          cargo test
          cargo clippy --all-targets -- -D warnings
          ./target/release/socrates test tests/spec > /dev/null
          # glcube's three mains need a live GL/Metal/Vulkan window (ci.yml's
          # windowing jobs run them); everything else runs here, including
          # glcube's own GL-free cube.soc/spec.soc.
          shopt -s extglob
          ./target/release/socrates test demos/!(glcube)/ demos/glcube/cube.soc demos/glcube/spec.soc > /dev/null

      - name: Assemble the demo zoo
        shell: bash
        run: |
          mkdir -p zoo
          if [ "${{ matrix.macos_section }}" = "true" ]; then
            # macOS: build each demo binary by linking its payload in as a
            # `__DATA,__socrateszoo` section (appending can't be code-signed).
            # The linker ad-hoc signs by default; re-sign + verify explicitly.
            host="target/release/socrates"
            mkdir -p payloads
            for d in demos/*/; do
              name="$(basename "$d")"
              [ -f "${d}main.soc" ] || continue
              "$host" build "demos/$name" --payload-only -o "$PWD/payloads/$name.bin"
              RUSTFLAGS="-Clink-arg=-Wl,-sectcreate,__DATA,__socrateszoo,$PWD/payloads/$name.bin" \
                cargo build --release --target ${{ matrix.target }}
              cp "target/${{ matrix.target }}/release/socrates" "zoo/${name}"
              codesign --force --sign - "zoo/${name}"
              codesign --verify --strict "zoo/${name}"
            done
          else
            # The host stapler is the runner's native `socrates`; we only ever
            # cross within an OS, so the host extension equals matrix.ext.
            host="target/release/socrates${{ matrix.ext }}"
            launcher="target/${{ matrix.target }}/release/socrates${{ matrix.ext }}"
            for d in demos/*/; do
              name="$(basename "$d")"
              [ -f "${d}main.soc" ] || continue
              "$host" build "demos/$name" --launcher "$launcher" -o "zoo/${name}${{ matrix.ext }}"
            done
          fi
          cp demos/README.md LICENSE NOTICE zoo/
          ls -l zoo

      # Phase B: upgrade the ad-hoc macOS signatures to Developer ID + Apple
      # notarization so downloaded binaries open with no Gatekeeper warning.
      # Dormant until the signing secrets are set — the ad-hoc binaries above
      # ship as-is otherwise. Setup runbook: docs/RELEASING-macOS.md.
      # Required repo secrets:
      #   MACOS_CERT_P12_BASE64   base64 of the Developer ID Application .p12
      #   MACOS_CERT_PASSWORD     the .p12 export password
      #   MACOS_SIGN_IDENTITY     e.g. "Developer ID Application: Name (TEAMID)"
      #   MACOS_NOTARY_KEY_P8_BASE64 / _KEY_ID / _ISSUER_ID  App Store Connect API key
      - name: Developer ID sign + notarize (when configured)
        if: matrix.macos_section && env.MACOS_CERT_P12_BASE64 != ''
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
          MACOS_NOTARY_KEY_P8_BASE64: ${{ secrets.MACOS_NOTARY_KEY_P8_BASE64 }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
        run: |
          set -euo pipefail
          kc="$RUNNER_TEMP/socrates-signing.keychain-db"
          kcpw="$(uuidgen)"
          security create-keychain -p "$kcpw" "$kc"
          security set-keychain-settings -lut 21600 "$kc"
          security unlock-keychain -p "$kcpw" "$kc"
          echo "$MACOS_CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$kc" -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$kcpw" "$kc" >/dev/null
          security list-keychains -d user -s "$kc" login.keychain-db
          echo "$MACOS_NOTARY_KEY_P8_BASE64" | base64 --decode > "$RUNNER_TEMP/notary.p8"
          # Re-sign every binary with Developer ID (hardened runtime + timestamp).
          for b in zoo/*; do
            case "$(basename "$b")" in README.md|LICENSE|NOTICE) continue;; esac
            [ -f "$b" ] || continue
            codesign --force --options runtime --timestamp \
              --sign "$MACOS_SIGN_IDENTITY" --keychain "$kc" "$b"
            codesign --verify --strict "$b"
          done
          # Notarize all binaries in one submission (bare CLI tools can't have a
          # ticket stapled, so Gatekeeper verifies online on first run).
          ( cd zoo && zip -q -X "$RUNNER_TEMP/zoo.zip" $(ls | grep -vE '^(README\.md|LICENSE|NOTICE)$') )
          xcrun notarytool submit "$RUNNER_TEMP/zoo.zip" \
            --key "$RUNNER_TEMP/notary.p8" \
            --key-id "$MACOS_NOTARY_KEY_ID" \
            --issuer "$MACOS_NOTARY_ISSUER_ID" \
            --wait
          security delete-keychain "$kc"
          echo "Developer ID signed + notarized the macOS zoo"

      - name: Package
        shell: bash
        run: |
          mkdir -p dist stage
          # The plain interpreter.
          cp "target/${{ matrix.target }}/release/socrates${{ matrix.ext }}" stage/
          cp LICENSE NOTICE README.md stage/
          tar -C stage -czf "dist/socrates-${TAG}-${{ matrix.label }}.tar.gz" .
          # The demo zoo.
          tar -C zoo -czf "dist/socrates-demozoo-${TAG}-${{ matrix.label }}.tar.gz" .

      - name: Upload artifacts
        # v6 is the first upload-artifact major that ships on the Node 24
        # runtime; v5 and earlier declare node20 and the runner warns as it
        # force-runs them on 24. Input surface is unchanged from v4/v5.
        uses: actions/upload-artifact@v6
        with:
          name: release-${{ matrix.label }}
          path: dist/*
          if-no-files-found: error

  draft-release:
    name: Draft release
    needs: build
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Resolve tag
        env:
          EVENT: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ "$EVENT" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
          elif [ "$GITHUB_REF" = "refs/heads/main" ]; then
            TAG="$(head -1 .github/RELEASE_TAG | tr -d '[:space:]')"
          else
            TAG="$GITHUB_REF_NAME"
          fi
          echo "TAG=$TAG" >> "$GITHUB_ENV"

      - name: Gather built artifacts
        # download-artifact has no Node 24 major yet (v4/v5/v6 all declare
        # node20), so pinning higher wouldn't silence the runner's node20
        # warning here — and v6 changes the no-`name` multi-artifact layout
        # this step relies on (each artifact under artifacts/<name>/). Stay on
        # the validated v5 until an upstream node24 release exists.
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Draft the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # The x86_64-linux job carries validation; if it failed, its
          # artifacts are absent and we must not draft a release.
          if [ ! -f "artifacts/release-x86_64-linux/socrates-${TAG}-x86_64-linux.tar.gz" ]; then
            echo "x86_64-linux artifacts missing (validation failed?); refusing to draft" >&2
            exit 1
          fi
          mapfile -t assets < <(find artifacts -type f -name '*.tar.gz' | sort)
          echo "assets to attach:"; printf '  %s\n' "${assets[@]}"
          # Publishing a draft creates the tag as a real user, which re-fires
          # the tag-push trigger — this guard avoids a duplicate draft for a
          # release that already shipped.
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "release $TAG already exists; refreshing assets and notes"
            gh release upload "$TAG" "${assets[@]}" --clobber
            # Re-runs (e.g. once macOS notarization is configured) must also
            # refresh the body and re-point the draft at the current commit —
            # otherwise a re-cut keeps its first notes and its first target, so
            # publishing would tag an old commit that predates later fixes.
            gh release edit "$TAG" --target "$GITHUB_SHA" --notes-file .github/RELEASE_NOTES.md
          else
            gh release create "$TAG" \
              --draft \
              --prerelease \
              --target "$GITHUB_SHA" \
              --title "Socrates $TAG" \
              --notes-file .github/RELEASE_NOTES.md \
              "${assets[@]}"
          fi
