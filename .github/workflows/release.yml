name: Release

# Two ways in, same result — a DRAFT release to publish by hand:
#   * push a tag like v0.6.0, or
#   * run this workflow manually (Actions -> Release -> Run workflow)
#     with the tag name as input; `gh release create` then creates the
#     tag at the dispatched commit as part of drafting the release.
# Either way the release binary is rebuilt and the full validation
# suite re-runs against the exact released revision first.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create (e.g. v0.6.0)"
        required: true

permissions:
  contents: write

jobs:
  draft-release:
    name: Draft release
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build and validate
        run: |
          cargo build --release
          cargo test
          ./target/release/fable test tests/spec demos > /dev/null
      - name: Package binary
        run: |
          mkdir -p dist
          cp target/release/fable dist/
          cp LICENSE NOTICE README.md dist/
          tar -C dist -czf "fable-${TAG}-x86_64-linux.tar.gz" .
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$TAG" \
            --draft \
            --target "$GITHUB_SHA" \
            --title "Fable $TAG" \
            --notes-file .github/RELEASE_NOTES.md \
            "fable-${TAG}-x86_64-linux.tar.gz"
