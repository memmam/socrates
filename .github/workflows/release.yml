name: Release

# Three ways in, same result — a DRAFT release to publish by hand:
#   * push a tag like v0.6.0,
#   * run this workflow manually (Actions -> Release -> Run workflow)
#     with the tag name as input, or
#   * land a change to .github/RELEASE_TAG on main containing the tag
#     name — the release-by-pull-request path, for actors whose access
#     is branch-scoped (a PR is the only ref they can move).
# In the latter two, `gh release create` mints the tag at the built
# commit as part of drafting the release.
#
# The `build` matrix cross-compiles the interpreter for five desktop
# targets and, on each, staples every demo into a self-contained binary
# (the "demo zoo") with `fable build`. Stapling is host-independent byte
# work — a host `fable` reads the target launcher from a file — so the
# whole zoo for a target is assembled on that target's runner without
# ever executing the cross-built binary. The x86_64-linux job also runs
# the full validation suite; if it fails, its artifacts are never
# uploaded and the release step refuses to draft.

on:
  push:
    tags: ["v*"]
    branches: [main]
    paths: [".github/RELEASE_TAG"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create (e.g. v0.6.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            label: x86_64-linux
            ext: ""
            validate: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            label: aarch64-linux
            ext: ""
            apt: gcc-aarch64-linux-gnu
            linker: aarch64-linux-gnu-gcc
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: x86_64-windows
            ext: ".exe"
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            label: aarch64-windows
            ext: ".exe"
          - os: macos-14
            target: aarch64-apple-darwin
            label: aarch64-macos
            ext: ""
            codesign: true
    env:
      TAG: pending
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        shell: bash
        env:
          EVENT: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ "$EVENT" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
          elif [ "$GITHUB_REF" = "refs/heads/main" ]; then
            TAG="$(head -1 .github/RELEASE_TAG | tr -d '[:space:]')"
          else
            TAG="$GITHUB_REF_NAME"
          fi
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "releasing $TAG for ${{ matrix.label }}"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cross linker (aarch64 linux)
        if: matrix.apt != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt }}

      - name: Build host stapler
        # A host-runnable `fable` to run `fable build` on this runner. On a
        # native-arch target this is redundant with the launcher, but keeping
        # the step uniform across native and cross targets is worth the few
        # extra seconds.
        run: cargo build --release

      - name: Build target launcher
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Validate (x86_64-linux only)
        if: matrix.validate
        run: |
          cargo test
          cargo clippy --all-targets -- -D warnings
          ./target/release/fable test tests/spec demos > /dev/null

      - name: Assemble the demo zoo
        shell: bash
        run: |
          # The host stapler is the runner's native `fable`; we only ever
          # cross within an OS, so the host extension equals matrix.ext.
          host="target/release/fable${{ matrix.ext }}"
          launcher="target/${{ matrix.target }}/release/fable${{ matrix.ext }}"
          # macOS: the stapled binary is signed as a whole below, so strip the
          # launcher's linker signature first (the ad-hoc signature must cover
          # the appended payload; `read_self` scans past the trailing
          # signature for the magic).
          if [ "${{ matrix.codesign }}" = "true" ]; then
            codesign --remove-signature "$launcher" || true
          fi
          mkdir -p zoo
          for d in demos/*/; do
            name="$(basename "$d")"
            [ -f "${d}main.fable" ] || continue
            "$host" build "demos/$name" --launcher "$launcher" -o "zoo/${name}${{ matrix.ext }}"
            # arm64 macOS refuses to run an unsigned/tampered binary, so
            # ad-hoc sign each stapled binary and verify the signature covers it.
            if [ "${{ matrix.codesign }}" = "true" ]; then
              codesign --force --sign - "zoo/${name}${{ matrix.ext }}"
              codesign --verify --strict "zoo/${name}${{ matrix.ext }}"
            fi
          done
          cp demos/README.md LICENSE NOTICE zoo/
          ls -l zoo

      - name: Package
        shell: bash
        run: |
          mkdir -p dist stage
          # The plain interpreter.
          cp "target/${{ matrix.target }}/release/fable${{ matrix.ext }}" stage/
          cp LICENSE NOTICE README.md stage/
          tar -C stage -czf "dist/fable-${TAG}-${{ matrix.label }}.tar.gz" .
          # The demo zoo.
          tar -C zoo -czf "dist/fable-demozoo-${TAG}-${{ matrix.label }}.tar.gz" .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.label }}
          path: dist/*
          if-no-files-found: error

  draft-release:
    name: Draft release
    needs: build
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        env:
          EVENT: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ "$EVENT" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
          elif [ "$GITHUB_REF" = "refs/heads/main" ]; then
            TAG="$(head -1 .github/RELEASE_TAG | tr -d '[:space:]')"
          else
            TAG="$GITHUB_REF_NAME"
          fi
          echo "TAG=$TAG" >> "$GITHUB_ENV"

      - name: Gather built artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Draft the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # The x86_64-linux job carries validation; if it failed, its
          # artifacts are absent and we must not draft a release.
          if [ ! -f "artifacts/release-x86_64-linux/fable-${TAG}-x86_64-linux.tar.gz" ]; then
            echo "x86_64-linux artifacts missing (validation failed?); refusing to draft" >&2
            exit 1
          fi
          mapfile -t assets < <(find artifacts -type f -name '*.tar.gz' | sort)
          echo "assets to attach:"; printf '  %s\n' "${assets[@]}"
          # Publishing a draft creates the tag as a real user, which re-fires
          # the tag-push trigger — this guard avoids a duplicate draft for a
          # release that already shipped.
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "release $TAG already exists; uploading any missing assets"
            gh release upload "$TAG" "${assets[@]}" --clobber
          else
            gh release create "$TAG" \
              --draft \
              --prerelease \
              --target "$GITHUB_SHA" \
              --title "Fable $TAG" \
              --notes-file .github/RELEASE_NOTES.md \
              "${assets[@]}"
          fi
