name: Release

# Three ways in, same result — a DRAFT release to publish by hand:
#   * push a tag like v0.6.0,
#   * run this workflow manually (Actions -> Release -> Run workflow)
#     with the tag name as input, or
#   * land a change to .github/RELEASE_TAG on main containing the tag
#     name — the release-by-pull-request path, for actors whose access
#     is branch-scoped (a PR is the only ref they can move).
# In the latter two, `gh release create` mints the tag at the built
# commit as part of drafting the release. Every path rebuilds the
# release binary and re-runs the full validation suite against the
# exact released revision first.

on:
  push:
    tags: ["v*"]
    branches: [main]
    paths: [".github/RELEASE_TAG"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create (e.g. v0.6.0)"
        required: true

permissions:
  contents: write

jobs:
  draft-release:
    name: Draft release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Resolve tag
        env:
          EVENT: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ "$EVENT" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
          elif [ "$GITHUB_REF" = "refs/heads/main" ]; then
            TAG="$(head -1 .github/RELEASE_TAG | tr -d '[:space:]')"
          else
            TAG="$GITHUB_REF_NAME"
          fi
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "releasing $TAG"
      - uses: dtolnay/rust-toolchain@stable
      - name: Build and validate
        run: |
          cargo build --release
          cargo test
          ./target/release/fable test tests/spec demos > /dev/null
      - name: Package binary
        run: |
          mkdir -p dist
          cp target/release/fable dist/
          cp LICENSE NOTICE README.md dist/
          tar -C dist -czf "fable-${TAG}-x86_64-linux.tar.gz" .
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$TAG" \
            --draft \
            --target "$GITHUB_SHA" \
            --title "Fable $TAG" \
            --notes-file .github/RELEASE_NOTES.md \
            "fable-${TAG}-x86_64-linux.tar.gz"
