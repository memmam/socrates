[package]
name = "fable"
version = "0.6.0"
edition = "2021"
description = "The Fable programming language: statically typed, garbage collected, implemented from scratch with zero dependencies"
license = "Apache-2.0"
repository = "https://github.com/memmam/fable"

[[bin]]
name = "fable"
path = "src/main.rs"

[lib]
name = "fable"
path = "src/lib.rs"

[profile.release]
lto = true
codegen-units = 1

[dependencies]
